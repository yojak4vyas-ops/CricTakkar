<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — CricTakkar</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo" onclick="window.location.href='index.html'" style="cursor:pointer">🏏 CricTakkar</div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="quiz.html" class="nav-link">Daily Quiz</a>
      <a href="categories.html" class="nav-link">Categories</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">🏏</div>
      <h1 class="auth-title">CricTakkar</h1>
      <p class="auth-subtitle">India's Cricket Quiz Platform</p>

      <button class="google-btn" id="googleBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20" />
        Continue with Google
      </button>

      <div class="divider"><span>or</span></div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTab">Log In</button>
        <button class="auth-tab" id="signupTab">Sign Up</button>
      </div>

      <div class="error-box" id="errorBox" style="display:none">
        <span id="errorMessage">Something went wrong.</span>
      </div>

      <div class="success-box" id="successBox" style="display:none">
        <span id="successMessage">Done!</span>
      </div>

      <div id="loginForm">
        <div class="input-group">
          <label class="input-label" for="loginEmail">Email Address</label>
          <input type="email" class="auth-input" id="loginEmail" placeholder="you@example.com" />
        </div>
        <div class="input-group">
          <label class="input-label" for="loginPassword">Password</label>
          <input type="password" class="auth-input" id="loginPassword" placeholder="Your password" />
        </div>
        <button class="btn-primary auth-btn" id="loginBtn">Log In 🏏</button>
      </div>

      <div id="signupForm" style="display:none">
        <div class="input-group">
          <label class="input-label" for="signupUsername">Username</label>
          <input type="text" class="auth-input" id="signupUsername"
            placeholder="e.g. CricketFan_Mumbai"
            maxlength="20"
            oninput="resetUsernameStatus()" />
          <!-- Live availability indicator shown as user types -->
          <div id="usernameStatus" style="
            font-size: 0.78rem;
            font-weight: 600;
            margin-top: 5px;
            min-height: 18px;
            padding-left: 2px;
          "></div>
        </div>
        <div class="input-group">
          <label class="input-label" for="signupTeam">Favourite Team</label>
          <select class="auth-input auth-select" id="signupTeam">
            <option value="">Select your team</option>
            <option value="India">🇮🇳 Team India</option>
            <option value="Mumbai Indians">Mumbai Indians</option>
            <option value="Chennai Super Kings">Chennai Super Kings</option>
            <option value="Royal Challengers Bengaluru">Royal Challengers Bengaluru</option>
            <option value="Kolkata Knight Riders">Kolkata Knight Riders</option>
            <option value="Rajasthan Royals">Rajasthan Royals</option>
            <option value="Delhi Capitals">Delhi Capitals</option>
            <option value="Punjab Kings">Punjab Kings</option>
            <option value="Sunrisers Hyderabad">Sunrisers Hyderabad</option>
            <option value="Gujarat Titans">Gujarat Titans</option>
            <option value="Lucknow Super Giants">Lucknow Super Giants</option>
          </select>
        </div>
        <div class="input-group">
          <label class="input-label" for="signupEmail">Email Address</label>
          <input type="email" class="auth-input" id="signupEmail" placeholder="you@example.com" />
        </div>
        <div class="input-group">
          <label class="input-label" for="signupPassword">Password (minimum 6 characters)</label>
          <input type="password" class="auth-input" id="signupPassword" placeholder="Create a password" />
        </div>
        <button class="btn-primary auth-btn" id="signupBtn">Create Account 🚀</button>
      </div>

    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    // ===== FIREBASE SETUP =====
    const firebaseConfig = {
      apiKey: "AIzaSyBYOs-GNvpmbp6gGM5A5N2A4nPT2wvMfbE",
      authDomain: "crictakkar-44c10.firebaseapp.com",
      projectId: "crictakkar-44c10",
      storageBucket: "crictakkar-44c10.firebasestorage.app",
      messagingSenderId: "96883177573",
      appId: "1:96883177573:web:215aba6e651fbac6086e8c"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const googleProvider = new firebase.auth.GoogleAuthProvider();

    // ===== CHECK IF ALREADY LOGGED IN =====
    auth.onAuthStateChanged(function(user) {
      if (user) {
        window.location.href = 'profile.html';
      }
    });

    // ===== GOOGLE LOGIN =====
    document.getElementById('googleBtn').addEventListener('click', function() {
      var btn = document.getElementById('googleBtn');
      btn.disabled = true;
      btn.textContent = 'Opening Google...';

      auth.signInWithPopup(googleProvider).then(function(result) {
        var user = result.user;
        db.collection('users').doc(user.uid).get().then(function(doc) {
          if (!doc.exists) {
            // For Google users, generate a unique username automatically
            // We take their display name and add a random 4-digit number
            var baseName = (user.displayName || 'CricFan').replace(/\s+/g, '');
            var randomNum = Math.floor(1000 + Math.random() * 9000);
            var autoUsername = baseName + randomNum;

            db.collection('users').doc(user.uid).set({
              username: autoUsername,
              email: user.email,
              favouriteTeam: '',
              quizzesPlayed: 0,
              totalScore: 0,
              totalQuestions: 0,
              currentStreak: 0,
              bestStreak: 0,
              xp: 0,
              level: 'Debutant',
              emailVerified: true,
              loginMethod: 'google',
              joinedDate: new Date().toISOString()
            });
          }
          showSuccess('Welcome! Taking you to your profile...');
          setTimeout(function() { window.location.href = 'profile.html'; }, 1000);
        });
      }).catch(function(error) {
        if (error.code === 'auth/popup-closed-by-user') {
          btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20" /> Continue with Google';
          btn.disabled = false;
        } else {
          showError('Google sign in failed: ' + error.message);
          btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20" /> Continue with Google';
          btn.disabled = false;
        }
      });
    });

    // ===== TAB SWITCHING =====
    document.getElementById('loginTab').addEventListener('click', function() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('signupForm').style.display = 'none';
      document.getElementById('loginTab').classList.add('active');
      document.getElementById('signupTab').classList.remove('active');
      hideMessages();
    });

    document.getElementById('signupTab').addEventListener('click', function() {
      document.getElementById('signupForm').style.display = 'block';
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('signupTab').classList.add('active');
      document.getElementById('loginTab').classList.remove('active');
      hideMessages();
    });

    // ===== LOGIN BUTTON =====
    document.getElementById('loginBtn').addEventListener('click', function() {
      var email = document.getElementById('loginEmail').value.trim();
      var password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        showError('Please fill in both email and password.');
        return;
      }

      var btn = document.getElementById('loginBtn');
      btn.textContent = 'Logging in...';
      btn.disabled = true;

      auth.signInWithEmailAndPassword(email, password).then(function() {
        showSuccess('Welcome back! Taking you to your profile...');
        setTimeout(function() { window.location.href = 'profile.html'; }, 1000);
      }).catch(function(error) {
        showError(getFriendlyError(error.code));
        btn.textContent = 'Log In 🏏';
        btn.disabled = false;
      });
    });

    // ===== USERNAME LIVE CHECK =====
    // This runs when user stops typing in the username box
    // It checks Firebase and shows a green tick or red cross instantly
    var usernameCheckTimer = null;

    document.getElementById('signupUsername').addEventListener('input', function() {
      var username = this.value.trim();
      var statusEl = document.getElementById('usernameStatus');

      // Clear any previous check timer
      clearTimeout(usernameCheckTimer);

      // Reset if too short
      if (username.length < 3) {
        statusEl.textContent = '';
        return;
      }

      statusEl.style.color = 'rgba(255,255,255,0.4)';
      statusEl.textContent = 'Checking...';

      // Wait 600ms after user stops typing before checking
      // This avoids checking Firebase on every single keystroke
      usernameCheckTimer = setTimeout(function() {
        checkUsernameAvailability(username);
      }, 600);
    });

    function checkUsernameAvailability(username) {
      var statusEl = document.getElementById('usernameStatus');

      db.collection('users')
        .where('username', '==', username)
        .limit(1)
        .get()
        .then(function(snapshot) {
          if (snapshot.empty) {
            // Username is free
            statusEl.style.color = '#27ae60';
            statusEl.textContent = '✅ Username available!';
          } else {
            // Username is taken
            statusEl.style.color = '#e74c3c';
            statusEl.textContent = '❌ Username already taken. Try another.';
          }
        })
        .catch(function() {
          statusEl.textContent = '';
        });
    }

    function resetUsernameStatus() {
      // Called on every keystroke via oninput on the input field
      // Clears the status immediately when user changes the text
      // (the input event listener above then re-checks after 600ms)
    }

    // ===== SIGN UP BUTTON =====
    document.getElementById('signupBtn').addEventListener('click', function() {
      var username = document.getElementById('signupUsername').value.trim();
      var team = document.getElementById('signupTeam').value;
      var email = document.getElementById('signupEmail').value.trim();
      var password = document.getElementById('signupPassword').value;

      // Basic validation first
      if (!username || !team || !email || !password) {
        showError('Please fill in all fields.');
        return;
      }
      if (username.length < 3) {
        showError('Username must be at least 3 characters.');
        return;
      }
      if (password.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
      }

      // Block certain characters that would break the friend search
      var validUsername = /^[a-zA-Z0-9_]+$/.test(username);
      if (!validUsername) {
        showError('Username can only contain letters, numbers, and underscores. No spaces or special characters.');
        return;
      }

      var btn = document.getElementById('signupBtn');
      btn.textContent = 'Checking username...';
      btn.disabled = true;

      // ===== USERNAME UNIQUENESS CHECK =====
      // Before creating the account, search Firebase for this username
      // If another user already has it, block the signup
      db.collection('users')
        .where('username', '==', username)
        .limit(1)
        .get()
        .then(function(snapshot) {

          if (!snapshot.empty) {
            // Username is taken — stop here, show error
            showError('❌ Username "' + username + '" is already taken. Please choose a different one.');
            btn.textContent = 'Create Account 🚀';
            btn.disabled = false;
            return;
          }

          // Username is free — now create the Firebase Auth account
          btn.textContent = 'Creating account...';

          auth.createUserWithEmailAndPassword(email, password)
            .then(function(result) {
              var user = result.user;
              user.sendEmailVerification();

              // Save user profile to Firestore
              return db.collection('users').doc(user.uid).set({
                username: username,
                email: email,
                favouriteTeam: team,
                quizzesPlayed: 0,
                totalScore: 0,
                totalQuestions: 0,
                currentStreak: 0,
                bestStreak: 0,
                xp: 0,
                level: 'Debutant',
                emailVerified: false,
                loginMethod: 'email',
                joinedDate: new Date().toISOString()
              });
            })
            .then(function() {
              showSuccess('Account created! A verification email has been sent. You can play while you verify! 🏏');
              setTimeout(function() { window.location.href = 'profile.html'; }, 2500);
            })
            .catch(function(error) {
              showError(getFriendlyError(error.code));
              btn.textContent = 'Create Account 🚀';
              btn.disabled = false;
            });

        })
        .catch(function(error) {
          console.error('Username check failed:', error);
          showError('Could not verify username. Please try again.');
          btn.textContent = 'Create Account 🚀';
          btn.disabled = false;
        });
    });

    // ===== HELPER FUNCTIONS =====
    function showError(message) {
      document.getElementById('errorMessage').textContent = message;
      document.getElementById('errorBox').style.display = 'block';
      document.getElementById('successBox').style.display = 'none';
    }

    function showSuccess(message) {
      document.getElementById('successMessage').textContent = message;
      document.getElementById('successBox').style.display = 'block';
      document.getElementById('errorBox').style.display = 'none';
    }

    function hideMessages() {
      document.getElementById('errorBox').style.display = 'none';
      document.getElementById('successBox').style.display = 'none';
    }

    function getFriendlyError(code) {
      if (code === 'auth/email-already-in-use') return 'This email is already registered. Try logging in instead.';
      if (code === 'auth/wrong-password') return 'Wrong password. Please try again.';
      if (code === 'auth/user-not-found') return 'No account found with this email. Sign up first!';
      if (code === 'auth/invalid-email') return 'Please enter a valid email address.';
      if (code === 'auth/weak-password') return 'Password is too weak. Use at least 6 characters.';
      if (code === 'auth/network-request-failed') return 'No internet connection. Please check your connection.';
      if (code === 'auth/invalid-credential') return 'Wrong email or password. Please try again.';
      return 'Something went wrong. Please try again.';
    }
  </script>

</body>
</html>
