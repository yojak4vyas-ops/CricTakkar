<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — CricTakkar</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo" onclick="window.location.href='index.html'" style="cursor:pointer">🏏 CricTakkar</div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="quiz.html" class="nav-link">Mixed Category Quiz</a>
      <a href="categories.html" class="nav-link">Categories</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">🏏</div>
      <h1 class="auth-title">CricTakkar</h1>
      <p class="auth-subtitle">India's Cricket Quiz Platform</p>

      <button class="google-btn" id="googleBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20" />
        Continue with Google
      </button>

      <div class="divider"><span>or</span></div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTab">Log In</button>
        <button class="auth-tab" id="signupTab">Sign Up</button>
      </div>

      <div class="error-box" id="errorBox" style="display:none">
        <span id="errorMessage">Something went wrong.</span>
      </div>

      <div class="success-box" id="successBox" style="display:none">
        <span id="successMessage">Done!</span>
      </div>

      <!-- LOGIN FORM -->
      <div id="loginForm">
        <div class="input-group">
          <label class="input-label" for="loginEmail">Email Address</label>
          <input type="email" class="auth-input" id="loginEmail" placeholder="you@example.com" />
        </div>
        <div class="input-group">
          <label class="input-label" for="loginPassword">Password</label>
          <input type="password" class="auth-input" id="loginPassword" placeholder="Your password" />
        </div>
        <button class="btn-primary auth-btn" id="loginBtn">Log In 🏏</button>
      </div>

      <!-- SIGNUP FORM -->
      <div id="signupForm" style="display:none">

        <!-- FULL NAME — new field -->
        <div class="input-group">
          <label class="input-label" for="signupName">Full Name</label>
          <input type="text" class="auth-input" id="signupName"
            placeholder="e.g. Yojak Vyas" maxlength="40" />
        </div>

        <!-- USERNAME -->
        <div class="input-group">
          <label class="input-label" for="signupUsername">Username</label>
          <input type="text" class="auth-input" id="signupUsername"
            placeholder="e.g. YojakVyas_123" maxlength="20"
            oninput="liveCheckUsername()" />
          <div id="usernameStatus" style="
            font-size:0.78rem; font-weight:600;
            margin-top:5px; min-height:18px; padding-left:2px;
          "></div>
        </div>

        <div class="input-group">
          <label class="input-label" for="signupTeam">Favourite Team</label>
          <select class="auth-input auth-select" id="signupTeam">
            <option value="">Select your team</option>
            <option value="India">🇮🇳 Team India</option>
            <option value="Mumbai Indians">Mumbai Indians</option>
            <option value="Chennai Super Kings">Chennai Super Kings</option>
            <option value="Royal Challengers Bengaluru">Royal Challengers Bengaluru</option>
            <option value="Kolkata Knight Riders">Kolkata Knight Riders</option>
            <option value="Rajasthan Royals">Rajasthan Royals</option>
            <option value="Delhi Capitals">Delhi Capitals</option>
            <option value="Punjab Kings">Punjab Kings</option>
            <option value="Sunrisers Hyderabad">Sunrisers Hyderabad</option>
            <option value="Gujarat Titans">Gujarat Titans</option>
            <option value="Lucknow Super Giants">Lucknow Super Giants</option>
          </select>
        </div>

        <div class="input-group">
          <label class="input-label" for="signupEmail">Email Address</label>
          <input type="email" class="auth-input" id="signupEmail" placeholder="you@example.com" />
        </div>

        <div class="input-group">
          <label class="input-label" for="signupPassword">Password (minimum 6 characters)</label>
          <input type="password" class="auth-input" id="signupPassword" placeholder="Create a password" />
        </div>

        <button class="btn-primary auth-btn" id="signupBtn">Create Account 🚀</button>
      </div>

    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBYOs-GNvpmbp6gGM5A5N2A4nPT2wvMfbE",
      authDomain: "crictakkar-44c10.firebaseapp.com",
      projectId: "crictakkar-44c10",
      storageBucket: "crictakkar-44c10.firebasestorage.app",
      messagingSenderId: "96883177573",
      appId: "1:96883177573:web:215aba6e651fbac6086e8c"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const googleProvider = new firebase.auth.GoogleAuthProvider();

    // ===== ALREADY LOGGED IN =====
    auth.onAuthStateChanged(function(user) {
      if (user) { window.location.href = 'profile.html'; }
    });

    // ===== GOOGLE LOGIN =====
    document.getElementById('googleBtn').addEventListener('click', function() {
      var btn = document.getElementById('googleBtn');
      btn.disabled = true;
      btn.textContent = 'Opening Google...';

      auth.signInWithPopup(googleProvider).then(function(result) {
        var user = result.user;
        db.collection('users').doc(user.uid).get().then(function(doc) {
          if (!doc.exists) {
            // Auto-generate a unique username for Google users
            var baseName = (user.displayName || 'CricFan').replace(/\s+/g, '');
            var randomNum = Math.floor(1000 + Math.random() * 9000);
            var autoUsername = baseName + randomNum;

            db.collection('users').doc(user.uid).set({
              name: user.displayName || '',
              username: autoUsername,
              email: user.email,
              favouriteTeam: '',
              quizzesPlayed: 0,
              totalScore: 0,
              totalQuestions: 0,
              currentStreak: 0,
              bestStreak: 0,
              xp: 0,
              level: 'Debutant',
              emailVerified: true,
              loginMethod: 'google',
              joinedDate: new Date().toISOString()
            });
          }
          showSuccess('Welcome! Taking you to your profile...');
          setTimeout(function() { window.location.href = 'profile.html'; }, 1000);
        });
      }).catch(function(error) {
        if (error.code !== 'auth/popup-closed-by-user') {
          showError('Google sign in failed. Please try again.');
        }
        var btn = document.getElementById('googleBtn');
        btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20" /> Continue with Google';
        btn.disabled = false;
      });
    });

    // ===== TAB SWITCHING =====
    document.getElementById('loginTab').addEventListener('click', function() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('signupForm').style.display = 'none';
      document.getElementById('loginTab').classList.add('active');
      document.getElementById('signupTab').classList.remove('active');
      hideMessages();
    });

    document.getElementById('signupTab').addEventListener('click', function() {
      document.getElementById('signupForm').style.display = 'block';
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('signupTab').classList.add('active');
      document.getElementById('loginTab').classList.remove('active');
      hideMessages();
    });

    // ===== LOGIN =====
    document.getElementById('loginBtn').addEventListener('click', function() {
      var email = document.getElementById('loginEmail').value.trim();
      var password = document.getElementById('loginPassword').value;

      if (!email || !password) { showError('Please fill in both fields.'); return; }

      var btn = document.getElementById('loginBtn');
      btn.textContent = 'Logging in...';
      btn.disabled = true;

      auth.signInWithEmailAndPassword(email, password).then(function() {
        showSuccess('Welcome back! Taking you to your profile...');
        setTimeout(function() { window.location.href = 'profile.html'; }, 1000);
      }).catch(function(error) {
        showError(getFriendlyError(error.code));
        btn.textContent = 'Log In 🏏';
        btn.disabled = false;
      });
    });

    // ===== LIVE USERNAME CHECK =====
    var usernameTimer = null;
    function liveCheckUsername() {
      var username = document.getElementById('signupUsername').value.trim();
      var statusEl = document.getElementById('usernameStatus');
      clearTimeout(usernameTimer);
      statusEl.style.color = 'rgba(255,255,255,0.4)';
      statusEl.textContent = '';

      if (username.length < 3) return;

      if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        statusEl.style.color = '#e74c3c';
        statusEl.textContent = '❌ Letters, numbers, underscores only.';
        return;
      }

      statusEl.textContent = 'Checking...';
      usernameTimer = setTimeout(function() {
        db.collection('users').where('username', '==', username).limit(1).get()
          .then(function(snap) {
            if (snap.empty) {
              statusEl.style.color = '#27ae60';
              statusEl.textContent = '✅ Username available!';
            } else {
              statusEl.style.color = '#e74c3c';
              statusEl.textContent = '❌ Already taken. Try another.';
            }
          });
      }, 600);
    }

    // ===== SIGN UP =====
    document.getElementById('signupBtn').addEventListener('click', function() {
      var name     = document.getElementById('signupName').value.trim();
      var username = document.getElementById('signupUsername').value.trim();
      var team     = document.getElementById('signupTeam').value;
      var email    = document.getElementById('signupEmail').value.trim();
      var password = document.getElementById('signupPassword').value;

      // Validation
      if (!name || !username || !team || !email || !password) {
        showError('Please fill in all fields.'); return;
      }
      if (name.length < 2) {
        showError('Please enter your full name.'); return;
      }
      if (username.length < 3) {
        showError('Username must be at least 3 characters.'); return;
      }
      if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        showError('Username can only contain letters, numbers, and underscores.'); return;
      }
      if (password.length < 6) {
        showError('Password must be at least 6 characters.'); return;
      }

      var btn = document.getElementById('signupBtn');
      btn.textContent = 'Checking username...';
      btn.disabled = true;

      // Check username is unique
      db.collection('users').where('username', '==', username).limit(1).get()
        .then(function(snapshot) {
          if (!snapshot.empty) {
            showError('❌ Username "' + username + '" is already taken. Please choose another.');
            btn.textContent = 'Create Account 🚀';
            btn.disabled = false;
            return;
          }

          btn.textContent = 'Creating account...';

          auth.createUserWithEmailAndPassword(email, password)
            .then(function(result) {
              var user = result.user;
              user.sendEmailVerification();
              return db.collection('users').doc(user.uid).set({
                name: name,
                username: username,
                email: email,
                favouriteTeam: team,
                quizzesPlayed: 0,
                totalScore: 0,
                totalQuestions: 0,
                currentStreak: 0,
                bestStreak: 0,
                xp: 0,
                level: 'Debutant',
                emailVerified: false,
                loginMethod: 'email',
                joinedDate: new Date().toISOString()
              });
            })
            .then(function() {
              showSuccess('Account created! Verification email sent. 🏏');
              setTimeout(function() { window.location.href = 'profile.html'; }, 2500);
            })
            .catch(function(error) {
              showError(getFriendlyError(error.code));
              btn.textContent = 'Create Account 🚀';
              btn.disabled = false;
            });
        });
    });

    function showError(msg) {
      document.getElementById('errorMessage').textContent = msg;
      document.getElementById('errorBox').style.display = 'block';
      document.getElementById('successBox').style.display = 'none';
    }
    function showSuccess(msg) {
      document.getElementById('successMessage').textContent = msg;
      document.getElementById('successBox').style.display = 'block';
      document.getElementById('errorBox').style.display = 'none';
    }
    function hideMessages() {
      document.getElementById('errorBox').style.display = 'none';
      document.getElementById('successBox').style.display = 'none';
    }
    function getFriendlyError(code) {
      if (code === 'auth/email-already-in-use') return 'This email is already registered. Try logging in.';
      if (code === 'auth/wrong-password') return 'Wrong password. Please try again.';
      if (code === 'auth/user-not-found') return 'No account with this email. Sign up first!';
      if (code === 'auth/invalid-email') return 'Please enter a valid email address.';
      if (code === 'auth/weak-password') return 'Password too weak. Use at least 6 characters.';
      if (code === 'auth/network-request-failed') return 'No internet connection.';
      if (code === 'auth/invalid-credential') return 'Wrong email or password.';
      return 'Something went wrong. Please try again.';
    }
  </script>

</body>
</html>
