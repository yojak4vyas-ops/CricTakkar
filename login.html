<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — CricTakkar</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo" onclick="window.location.href='index.html'" style="cursor:pointer">🏏 CricTakkar</div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="quiz.html" class="nav-link">Daily Quiz</a>
      <a href="categories.html" class="nav-link">Categories</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">🏏</div>
      <h1 class="auth-title">CricTakkar</h1>
      <p class="auth-subtitle">India's Cricket Quiz Platform</p>

      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTab">Log In</button>
        <button class="auth-tab" id="signupTab">Sign Up</button>
      </div>

      <div class="error-box" id="errorBox" style="display:none">
        <span id="errorMessage">Something went wrong.</span>
      </div>

      <div class="success-box" id="successBox" style="display:none">
        <span id="successMessage">Done!</span>
      </div>

      <!-- LOGIN FORM -->
      <div id="loginForm">
        <div class="input-group">
          <label class="input-label" for="loginEmail">Email Address</label>
          <input type="email" class="auth-input" id="loginEmail" placeholder="you@example.com" />
        </div>
        <div class="input-group">
          <label class="input-label" for="loginPassword">Password</label>
          <input type="password" class="auth-input" id="loginPassword" placeholder="Your password" />
        </div>
        <button class="btn-primary auth-btn" id="loginBtn">
          Log In 🏏
        </button>
      </div>

      <!-- SIGN UP FORM -->
      <div id="signupForm" style="display:none">
        <div class="input-group">
          <label class="input-label" for="signupUsername">Username</label>
          <input type="text" class="auth-input" id="signupUsername" placeholder="e.g. CricketFan_Mumbai" maxlength="20" />
        </div>
        <div class="input-group">
          <label class="input-label" for="signupTeam">Favourite Team</label>
          <select class="auth-input auth-select" id="signupTeam">
            <option value="">Select your team</option>
            <option value="India">🇮🇳 Team India</option>
            <option value="Mumbai Indians">Mumbai Indians</option>
            <option value="Chennai Super Kings">Chennai Super Kings</option>
            <option value="Royal Challengers Bengaluru">Royal Challengers Bengaluru</option>
            <option value="Kolkata Knight Riders">Kolkata Knight Riders</option>
            <option value="Rajasthan Royals">Rajasthan Royals</option>
            <option value="Delhi Capitals">Delhi Capitals</option>
            <option value="Punjab Kings">Punjab Kings</option>
            <option value="Sunrisers Hyderabad">Sunrisers Hyderabad</option>
            <option value="Gujarat Titans">Gujarat Titans</option>
            <option value="Lucknow Super Giants">Lucknow Super Giants</option>
          </select>
        </div>
        <div class="input-group">
          <label class="input-label" for="signupEmail">Email Address</label>
          <input type="email" class="auth-input" id="signupEmail" placeholder="you@example.com" />
        </div>
        <div class="input-group">
          <label class="input-label" for="signupPassword">Password (minimum 6 characters)</label>
          <input type="password" class="auth-input" id="signupPassword" placeholder="Create a password" />
        </div>
        <button class="btn-primary auth-btn" id="signupBtn">
          Create Account 🚀
        </button>
      </div>

    </div>
  </div>

  <script type="module">
    import { signUpUser, loginUser, watchAuthState } from '/firebase-config.js';

    // ===== CHECK IF ALREADY LOGGED IN =====
    watchAuthState(function(user) {
      if (user) {
        window.location.href = 'profile.html';
      }
    });

    // ===== TAB SWITCHING =====
    document.getElementById('loginTab').addEventListener('click', function() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('signupForm').style.display = 'none';
      document.getElementById('loginTab').classList.add('active');
      document.getElementById('signupTab').classList.remove('active');
      document.getElementById('errorBox').style.display = 'none';
      document.getElementById('successBox').style.display = 'none';
    });

    document.getElementById('signupTab').addEventListener('click', function() {
      document.getElementById('signupForm').style.display = 'block';
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('signupTab').classList.add('active');
      document.getElementById('loginTab').classList.remove('active');
      document.getElementById('errorBox').style.display = 'none';
      document.getElementById('successBox').style.display = 'none';
    });

    // ===== LOGIN BUTTON =====
    document.getElementById('loginBtn').addEventListener('click', async function() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        showError('Please fill in both email and password.');
        return;
      }

      this.textContent = 'Logging in...';
      this.disabled = true;

      const result = await loginUser(email, password);

      if (result.success) {
        showSuccess('Welcome back! Taking you to your profile...');
        setTimeout(() => { window.location.href = 'profile.html'; }, 1000);
      } else {
        showError(getFriendlyError(result.error));
        this.textContent = 'Log In 🏏';
        this.disabled = false;
      }
    });

    // ===== SIGN UP BUTTON =====
    document.getElementById('signupBtn').addEventListener('click', async function() {
      const username = document.getElementById('signupUsername').value.trim();
      const team = document.getElementById('signupTeam').value;
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;

      if (!username || !team || !email || !password) {
        showError('Please fill in all fields.');
        return;
      }
      if (username.length < 3) {
        showError('Username must be at least 3 characters.');
        return;
      }
      if (password.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
      }

      this.textContent = 'Creating account...';
      this.disabled = true;

      const result = await signUpUser(email, password, username, team);

      if (result.success) {
        showSuccess('Account created! Welcome to CricTakkar! 🏏');
        setTimeout(() => { window.location.href = 'profile.html'; }, 1000);
      } else {
        showError(getFriendlyError(result.error));
        this.textContent = 'Create Account 🚀';
        this.disabled = false;
      }
    });

    // ===== HELPER FUNCTIONS =====
    function showError(message) {
      document.getElementById('errorMessage').textContent = message;
      document.getElementById('errorBox').style.display = 'block';
      document.getElementById('successBox').style.display = 'none';
    }

    function showSuccess(message) {
      document.getElementById('successMessage').textContent = message;
      document.getElementById('successBox').style.display = 'block';
      document.getElementById('errorBox').style.display = 'none';
    }

    function getFriendlyError(error) {
      if (error.includes('email-already-in-use')) return 'This email is already registered. Try logging in instead.';
      if (error.includes('wrong-password')) return 'Wrong password. Please try again.';
      if (error.includes('user-not-found')) return 'No account found with this email. Sign up first!';
      if (error.includes('invalid-email')) return 'Please enter a valid email address.';
      if (error.includes('weak-password')) return 'Password is too weak. Use at least 6 characters.';
      if (error.includes('network-request-failed')) return 'No internet connection. Please check your connection.';
      if (error.includes('invalid-credential')) return 'Wrong email or password. Please try again.';
      return 'Something went wrong. Please try again.';
    }
  </script>

</body>
</html>
